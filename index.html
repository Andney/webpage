<!DOCTYPE html>
<html>

<head>
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<title>常用工具集</title>
	<link rel="stylesheet" href="./static/css/index.css">
</head>

<body>
	<div id="main_content">
		<h1>常用工具集</h1>
		<div id="tool_container"></div>
	</div>

	<script>
		// 工具列表数据
		const tools = [
			{ name: "RGB颜色转换", url: "./rgb/index.html" },
			{ name: "Model解析", url: "./model_parser/index.html" },
			{ name: "URL编码", url: "./tool/url-encode.html" },
			{ name: "生成UUID", url: "./tool/uuid.html" },
			{ name: "加解密", url: "./tool/encrypt.html" },
			{ name: "随机字符串生成器", url: "./tool/random-string.html" },
			{ name: "时间戳转换", url: "./tool/timestamp.html" },
			{ name: "Unicode编码", url: "./tool/unicode.html" },
			{ name: "Base64编码", url: "./tool/base64.html" },

			{ name: "JSON解析", url: "https://www.json.cn/#" },
			{ name: "JSON压缩转义", url: "https://www.bejson.com/zhuanyi/" },
			{ name: "JS/HTML格式化", url: "https://www.bejson.com/jshtml_format/" },
			{ name: "代码格式化", url: "https://tool.oschina.net/codeformat/" },
			{ name: "Picb图床", url: "https://www.picb.cc/" },
			{ name: "新浪图床", url: "https://www.bejson.com/ui/tuchuang/" },
			{ name: "高德GPS拾取", url: "https://lbs.amap.com/console/show/picker" },
			{ name: "百度GPS拾取", url: "https://api.map.baidu.com/lbsapi/getpoint/index.html" },
			{ name: "鸠摩搜索", url: "https://www.jiumodiary.com/" }
		];

		// 分离本地工具和外部工具
		const localTools = tools.filter(tool => tool.url.startsWith('./'));
		const externalTools = tools.filter(tool => !tool.url.startsWith('./'));

		// 获取容器
		const container = document.getElementById('tool_container');

		// 创建本地工具列表
		if (localTools.length > 0) {
			const localHeader = document.createElement('h2');
			localHeader.textContent = '本地工具';
			container.appendChild(localHeader);

			const localList = document.createElement('ul');
			localList.id = 'local_tool_list';
			localTools.forEach(tool => {
				const li = document.createElement('li');
				const a = document.createElement('a');
				a.href = tool.url;
				a.textContent = tool.name;
				li.appendChild(a);
				localList.appendChild(li);
			});
			container.appendChild(localList);
		}

		// 创建外部工具列表
		if (externalTools.length > 0) {
			const externalHeader = document.createElement('h2');
			externalHeader.textContent = '外部链接';
			container.appendChild(externalHeader);

			const externalList = document.createElement('ul');
			externalList.id = 'external_tool_list';
			externalTools.forEach(tool => {
				const li = document.createElement('li');
				const a = document.createElement('a');
				a.href = tool.url;
				a.textContent = tool.name;
				a.target = '_blank';
				a.rel = 'noreferrer';
				li.appendChild(a);
				externalList.appendChild(li);
			});
			container.appendChild(externalList);
		}
	</script>
</body>

</html>
