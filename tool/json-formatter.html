<!DOCTYPE html>
<html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
    <title>JSON格式化工具</title>
    <link rel="stylesheet" type="text/css" href="../static/css/toast.css" />
    <link rel="stylesheet" type="text/css" href="../static/css/common.css" />
    <script src="../static/js/common.js"></script>
    <style>
        .json-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .json-box {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .json-box label {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .json-box textarea {
            min-height: 400px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
        }
        
        .json-box .output-area {
            min-height: 400px;
            max-height: 400px;
            overflow: auto;
            border: solid 1px #E0E0E0;
            border-radius: 8px;
            padding: 10px;
            background-color: #f8f9fa;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-all;
        }
        
        .json-box .output-area .string { color: #0d7377; }
        .json-box .output-area .number { color: #d84315; }
        .json-box .output-area .boolean { color: #1565c0; }
        .json-box .output-area .null { color: #757575; }
        .json-box .output-area .key { color: #c62828; }
        
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .actions input {
            height: 2.5em;
            padding-left: 1.5em;
            padding-right: 1.5em;
            margin-right: 0;
            background-color: #3182ce;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
        }
        
        .actions input:hover {
            background-color: #2c5282;
        }
        
        .actions input.secondary {
            background-color: #718096;
        }
        
        .actions input.secondary:hover {
            background-color: #4a5568;
        }
        
        .options {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            align-items: center;
        }
        
        .options label {
            font-size: 14px;
            color: #666;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .options input[type="checkbox"] {
            width: 16px;
            height: 16px;
        }
        
        .options input[type="number"] {
            width: 60px;
            padding: 4px 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        
        @media (max-width: 768px) {
            .json-container {
                flex-direction: column;
            }
            
            .json-box textarea,
            .json-box .output-area {
                min-height: 200px;
                max-height: 300px;
            }
        }
    </style>
    
    <script type="text/javascript">
        // 语法高亮JSON
        function syntaxHighlight(json) {
            if (typeof json !== 'string') {
                json = JSON.stringify(json, undefined, 2);
            }
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                var cls = 'number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) {
                        cls = 'key';
                    } else {
                        cls = 'string';
                    }
                } else if (/true|false/.test(match)) {
                    cls = 'boolean';
                } else if (/null/.test(match)) {
                    cls = 'null';
                }
                return '<span class="' + cls + '">' + match + '</span>';
            });
        }
        
        // 格式化JSON
        function formatJson() {
            let text = getInputText();
            if (text.length < 1) {
                CTTool.showToast("请输入JSON内容");
                return;
            }
            
            try {
                let jsonObj = JSON.parse(text);
                let indent = document.getElementById('indent_size').value;
                let formatted = JSON.stringify(jsonObj, null, parseInt(indent));
                
                if (document.getElementById('syntax_highlight').checked) {
                    document.getElementById('output_result').innerHTML = syntaxHighlight(formatted);
                } else {
                    document.getElementById('output_result').textContent = formatted;
                }
                
                CTTool.showToast("格式化成功");
            } catch (e) {
                CTTool.showToast("JSON格式错误: " + e.message);
            }
        }
        
        // 压缩JSON
        function compressJson() {
            let text = getInputText();
            if (text.length < 1) {
                CTTool.showToast("请输入JSON内容");
                return;
            }
            
            try {
                let jsonObj = JSON.parse(text);
                let compressed = JSON.stringify(jsonObj);
                document.getElementById('output_result').textContent = compressed;
                CTTool.showToast("压缩成功");
            } catch (e) {
                CTTool.showToast("JSON格式错误: " + e.message);
            }
        }
        
        // 转义JSON
        function escapeJson() {
            let text = getInputText();
            if (text.length < 1) {
                CTTool.showToast("请输入JSON内容");
                return;
            }
            
            try {
                let jsonObj = JSON.parse(text);
                let jsonStr = JSON.stringify(jsonObj);
                let escaped = jsonStr.replace(/"/g, '\\"');
                document.getElementById('output_result').textContent = escaped;
                CTTool.showToast("转义成功");
            } catch (e) {
                CTTool.showToast("JSON格式错误: " + e.message);
            }
        }
        
        // 去除转义
        function unescapeJson() {
            let text = getInputText();
            if (text.length < 1) {
                CTTool.showToast("请输入JSON内容");
                return;
            }
            
            try {
                let unescaped = text.replace(/\\"/g, '"');
                let jsonObj = JSON.parse(unescaped);
                let formatted = JSON.stringify(jsonObj, null, 2);
                
                if (document.getElementById('syntax_highlight').checked) {
                    document.getElementById('output_result').innerHTML = syntaxHighlight(formatted);
                } else {
                    document.getElementById('output_result').textContent = formatted;
                }
                
                CTTool.showToast("去除转义成功");
            } catch (e) {
                CTTool.showToast("处理失败: " + e.message);
            }
        }
        
        // 复制结果
        function copyResult() {
            let outputDiv = document.getElementById('output_result');
            let text = outputDiv.textContent || outputDiv.innerText;
            text = text.trim();
            
            if (text.length < 1) {
                CTTool.showToast("没有可复制的内容");
                return;
            }
            
            CTTool.copyToClipboard(text, function (type) {
                if (type == 1) {
                    CTTool.showToast("复制成功");
                } else {
                    CTTool.showToast("复制失败");
                }
            });
        }
        
        // 清空内容
        function clearContent() {
            setInputText("");
            document.getElementById('output_result').innerHTML = "";
            CTTool.showToast("已清空");
        }
        
        // 加载示例
        function loadExample() {
            let example = {
                "name": "示例JSON",
                "version": "1.0.0",
                "author": "开发者",
                "features": ["格式化", "压缩", "转义", "复制"],
                "config": {
                    "enableHighlight": true,
                    "indentSize": 2
                },
                "data": {
                    "count": 42,
                    "active": true,
                    "metadata": null
                }
            };
            setInputText(JSON.stringify(example, null, 2));
            CTTool.showToast("已加载示例");
        }
        
        function getInputText() {
            return document.getElementById("input_content").value.trim();
        }
        
        function setInputText(str) {
            document.getElementById("input_content").value = str;
        }
    </script>
</head>

<body>
    <div class="main">
        <div class="content">
            <div class="back-button">
                <a href="../index.html" class="back-link">← 返回首页</a>
            </div>
            <h3>JSON格式化工具</h3>
            
            <div class="options">
                <label>
                    <input type="checkbox" id="syntax_highlight" checked>
                    语法高亮
                </label>
                <label>
                    缩进空格数:
                    <input type="number" id="indent_size" value="2" min="1" max="8">
                </label>
            </div>
            
            <div class="actions">
                <input type="button" value="格式化" onclick="formatJson();">
                <input type="button" value="压缩" onclick="compressJson();">
                <input type="button" value="转义" onclick="escapeJson();">
                <input type="button" value="去转义" onclick="unescapeJson();">
                <input type="button" value="复制结果" onclick="copyResult();">
                <input type="button" value="清空" class="secondary" onclick="clearContent();">
                <input type="button" value="示例" class="secondary" onclick="loadExample();">
            </div>
            
            <div class="json-container">
                <div class="json-box">
                    <label>输入JSON:</label>
                    <textarea id="input_content" placeholder="请输入JSON内容..."></textarea>
                </div>
                <div class="json-box">
                    <label>输出结果:</label>
                    <div id="output_result" class="output-area"></div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
