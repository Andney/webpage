<!DOCTYPE html>
<html>

<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
	<title>Unicode与中文互转</title>
	<link rel="stylesheet" type="text/css" href="../static/css/toast.css" />
	<link rel="stylesheet" type="text/css" href="../static/css/common.css" />
	<script src="../static/js/common.js"></script>
	
	<script type="text/javascript">
		function unicodeToChinese() {
			let text = getText();
			if (text.length < 1) {
				CTTool.showToast("内容为空");
				return;
			}
			document.getElementById("output_result").innerText = unescape(text.replace(/\\u/g, "%u"));
		}
		function chineseToUnicode() {
			let text = getText();
			if (text.length < 1) {
				CTTool.showToast("内容为空");
				return;
			}
			let unicode = "";
			for (let i = 0; i < text.length; i++) {
				unicode += "\\u" + text.charCodeAt(i).toString(16).padStart(4, "0");
			}
			document.getElementById("output_result").innerText = unicode;
		}
		function copy() {
			var text = document.getElementById("output_result").innerText.trim();
			CTTool.copyToClipboard(text, function (type) {
				if (type == 1) {
					CTTool.showToast("复制成功");
				} else {
					CTTool.showToast("复制失败");
				}
			});
		}
		function clearContent() {
			setText("");
		}
		function setText(str) {
			document.getElementById("input_content").value = str.trim();
		}
		function getText() {
			return document.getElementById("input_content").value.trim();
		}
	</script>
</head>

<body>
	<div class="main">
		<div class="content">
			<div class="back-button">
				<a href="../index.html" class="back-link">← 返回首页</a>
			</div>
			<h3>Unicode与中文互转</h3>
			<div class="input_container" style="margin-top: 10px; margin-bottom: 10px;">
				<textarea id="input_content" placeholder="请输入内容..."></textarea>
			</div>
			<div class="output" style="display: block; margin-bottom: 20px;">
				<p style="font-size:14px; color: #666;">输出结果：</p>
				<div id="output_result" class="output-result"></div>
			</div>
			<div class="actions">
				<input type="button" value="Unicode转中文" onclick="unicodeToChinese();">
				<input type="button" value="中文转Unicode" onclick="chineseToUnicode();">
				<input type="button" value="复制结果" onclick="copy();">
				<input type="button" value="清空" onclick="clearContent();">
			</div>
		</div>
	</div>

</body>

</html>
